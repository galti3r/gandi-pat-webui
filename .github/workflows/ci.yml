name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npx eslint --max-warnings 0 src/js/
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node --test src/test/*.js
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash build.sh
      - name: Check build size
        run: |
          total=$(du -sb dist/ | cut -f1)
          echo "Build size: ${total} bytes"
          if [ "$total" -gt 600000 ]; then
            echo "::warning::Build size exceeds 600KB"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
  e2e-ui:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: cd e2e && npm ci
      - run: cd e2e && npx playwright install --with-deps chromium
      - run: cd e2e && npx playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-results
          path: e2e/test-results/
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Containerfile
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          retry-on-snapshot-warnings: true
  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: false
          load: true
          tags: gandi-dns-webui:ci
          target: serve
      - uses: anchore/scan-action@v7
        with:
          image: gandi-dns-webui:ci
          severity-cutoff: critical
          fail-build: true
